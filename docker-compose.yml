services:
  app:
    image: ${DOCKERHUB_USERNAME}/tech-blog:latest
    container_name: tech-blog
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: always

  caddy:
    image: caddy:2.10
    container_name: tech-blog-caddy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: always

  node-exporter:
    image: prom/node-exporter
    container_name: tech-blog-node-exporter
    ports:
      - "9100:9100"

volumes:
  caddy_data:
  caddy_config:
