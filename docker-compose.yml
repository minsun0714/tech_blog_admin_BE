services:
  app:
    image: ${DOCKERHUB_USERNAME}/tech-blog:latest
    container_name: tech-blog
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: tech-blog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: always

  # =========================
  # Exporters
  # =========================

  node-exporter:
    image: prom/node-exporter
    container_name: tech-blog-node-exporter
    ports:
      - "9100:9100"
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot