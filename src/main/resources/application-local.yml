app:
  api-key: ${API_KEY}
spring:
  application:
    name: tech-blog

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

logging:
  file:
    path: /app/logs
  level:
    root: INFO
    org.springframework.security: TRACE

server:
  port: 8080
  forward-headers-strategy: framework